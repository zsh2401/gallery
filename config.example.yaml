imageRoot: ./.sample-gallery

server:
  bind: 127.0.0.1:8080

cache:
  backend: memory
  ttl: 24h
  thumbnailMaxBytes: 536870912

logging:
  level: debug
  format: pretty

features:
  rawPreview: embedded-jpeg
  mapProvider: amap

cors:
  allowedOrigins:
    - http://localhost:5173
    - http://127.0.0.1:5173

# Stats storage backend. "sqlite" (default), "memory", "postgres", or "mysql".
# sqlite needs no extra config — just works with a local file.
stats:
  backend: sqlite
  # sqlite:
  #   path: "gallery.db"
  #
  # postgres:
  #   dsn: "postgres://user:pass@localhost:5432/gallery?sslmode=disable"
  #
  # mysql:
  #   dsn: "user:pass@tcp(localhost:3306)/gallery?parseTime=true"
